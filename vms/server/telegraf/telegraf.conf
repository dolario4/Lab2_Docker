[agent]
  interval = "5s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  flush_interval = "5s"
  flush_jitter = "0s"
  precision = ""
  hostname = "linux-c-telegraf"
  omit_hostname = false

[[inputs.mqtt_consumer]]
  servers = ["tcp://192.168.9.10:1883"]
  topics = ["sensors/#"]
  qos = 0
  connection_timeout = "30s"
  client_id = "telegraf_linux_c"
  data_format = "influx"

[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "sensors"
  skip_database_creation = true
  username = "telegraf"
  password = "telegraf"
